<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperX Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">PaperX</p>
            <h1>Calendar</h1>
        </div>
        <button id="refresh-button" type="button">Refresh</button>
    </header>

    <main class="calendar-shell">
        <section class="today-panel">
            <p class="eyebrow">Next Reminder</p>
            <h2 id="next-title">No reminders yet</h2>
            <p id="next-time"></p>
        </section>

        <section class="reminder-list" aria-label="Calendar reminders">
            <div class="list-header">
                <h2>Redelivery Reminders</h2>
                <span id="count-label">0</span>
            </div>
            <div id="reminders"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
